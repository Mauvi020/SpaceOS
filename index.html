<style>
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #fff; }
  body {
    background:
      radial-gradient(ellipse at 20% 10%, rgba(120,80,255,0.35), transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(0,180,255,0.3), transparent 55%),
      radial-gradient(ellipse at 50% 50%, rgba(255,80,180,0.15), transparent 60%),
      #05060f;
    position: relative;
  }
  /* Stars */
  .stars, .stars::after {
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(1px 1px at 20px 30px, #fff, transparent),
      radial-gradient(1px 1px at 80px 120px, #fff, transparent),
      radial-gradient(1.5px 1.5px at 140px 60px, #fff, transparent),
      radial-gradient(1px 1px at 200px 200px, #fff, transparent),
      radial-gradient(1px 1px at 300px 90px, #fff, transparent),
      radial-gradient(1.5px 1.5px at 380px 250px, #fff, transparent),
      radial-gradient(1px 1px at 450px 30px, #fff, transparent);
    background-size: 500px 300px;
    opacity: 0.6;
  }

  /* Welcome Screen */
  #welcome {
    position: fixed; inset: 0; z-index: 1000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(circle at center, #0b0d24 0%, #02030a 100%);
    transition: opacity 0.8s ease;
  }
  #welcome.hidden { opacity: 0; pointer-events: none; }
  #welcome img { width: 140px; height: 140px; border-radius: 28px; box-shadow: 0 0 60px rgba(120,80,255,0.6); animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  #welcome h1 { margin-top: 24px; font-size: 42px; font-weight: 700; letter-spacing: 2px;
    background: linear-gradient(90deg, #fff, #a78bfa, #38bdf8); -webkit-background-clip: text; background-clip: text; color: transparent; }
  #welcome p { margin-top: 8px; color: #94a3b8; font-size: 14px; letter-spacing: 4px; text-transform: uppercase; }
  #enterBtn {
    margin-top: 40px; padding: 14px 36px; font-size: 15px; font-weight: 600;
    background: linear-gradient(135deg, #7c3aed, #2563eb); color: #fff;
    border: none; border-radius: 999px; cursor: pointer;
    box-shadow: 0 10px 30px rgba(124,58,237,0.5);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  #enterBtn:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(124,58,237,0.7); }

  /* Top bar */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 32px; z-index: 500;
    background: rgba(10, 10, 25, 0.55); backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; padding: 0 14px; font-size: 13px;
  }
  #topbar .left { display: flex; align-items: center; gap: 10px; font-weight: 600; }
  #topbar .left img { width: 18px; height: 18px; border-radius: 5px; }
  #topbar .center { flex: 1; text-align: center; color: #cbd5e1; font-size: 12px; }
  #topbar .right { display: flex; gap: 16px; color: #e2e8f0; font-variant-numeric: tabular-nums; }
  #topbar .icon { opacity: 0.8; }

  /* Desktop icons */
  #desktop { position: fixed; top: 40px; left: 16px; display: grid; grid-template-columns: repeat(auto-fill, 90px); gap: 8px; z-index: 1; }
  .dicon {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 10px 6px; border-radius: 10px; cursor: pointer; transition: background 0.15s;
  }
  .dicon:hover { background: rgba(255,255,255,0.08); }
  .dicon .glyph {
    width: 52px; height: 52px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  }
  .dicon span { font-size: 12px; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }

  .glyph.notes { background: linear-gradient(135deg, #facc15, #f97316); }
  .glyph.paint { background: linear-gradient(135deg, #ec4899, #8b5cf6); }
  .glyph.about { background: linear-gradient(135deg, #38bdf8, #6366f1); }

  /* Windows */
  .window {
    position: absolute; min-width: 320px; min-height: 200px;
    background: rgba(20, 22, 40, 0.78); backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 12px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    display: flex; flex-direction: column; overflow: hidden;
    animation: pop 0.18s ease;
  }
  @keyframes pop { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .titlebar {
    height: 34px; display: flex; align-items: center; padding: 0 12px; gap: 8px;
    background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.08);
    cursor: grab;
  }
  .titlebar:active { cursor: grabbing; }
  .tb-btn { width: 12px; height: 12px; border-radius: 50%; border: none; cursor: pointer; }
  .tb-close { background: #ff5f57; }
  .tb-min   { background: #febc2e; }
  .tb-max   { background: #28c840; }
  .tb-title { margin-left: 8px; font-size: 13px; color: #cbd5e1; font-weight: 500; }
  .wbody { flex: 1; padding: 14px; overflow: auto; user-select: text; color: #e2e8f0; font-size: 14px; }

  /* Notes app */
  .notes-app textarea {
    width: 100%; height: 100%; min-height: 240px;
    background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 12px; color: #fff; font-size: 14px;
    font-family: inherit; resize: none; outline: none;
  }

  /* Paint app */
  .paint-app { display: flex; flex-direction: column; gap: 10px; height: 100%; }
  .paint-tools { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .paint-tools button, .paint-tools input[type="color"], .paint-tools input[type="range"] {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
    color: #fff; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px;
  }
  .paint-tools input[type="color"] { padding: 2px; width: 36px; height: 32px; }
  canvas { background: #fff; border-radius: 8px; flex: 1; cursor: crosshair; touch-action: none; }

  /* About */
  .about-app { text-align: center; }
  .about-app img { width: 90px; height: 90px; border-radius: 22px; margin: 8px auto; box-shadow: 0 0 30px rgba(124,58,237,0.5); }
  .about-app h2 { margin: 10px 0 4px; font-size: 22px;
    background: linear-gradient(90deg, #fff, #a78bfa); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .about-app p { color: #94a3b8; font-size: 13px; margin-top: 4px; }
  .about-app .stats { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-top: 18px; text-align: left; }
  .about-app .stat { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; }
  .about-app .stat b { display: block; font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
  .about-app .stat span { font-size: 14px; }
</style>
</head>

<script>
/* ---------- Welcome ---------- */
document.getElementById('enterBtn').addEventListener('click', () => {
  document.getElementById('welcome').classList.add('hidden');
  setTimeout(() => document.getElementById('welcome').remove(), 800);
});

/* ---------- Clock ---------- */
function tick() {
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('clock').textContent =
    pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
}
setInterval(tick, 1000); tick();

/* ---------- Window system ---------- */
let zTop = 10;
const openWindows = {};

function createWindow({ id, title, width=420, height=320, x=120, y=80, body, cls='' }) {
  if (openWindows[id]) { focusWindow(openWindows[id]); return; }
  const win = document.createElement('div');
  win.className = 'window ' + cls;
  win.style.width = width + 'px';
  win.style.height = height + 'px';
  win.style.left = x + 'px';
  win.style.top = y + 'px';
  win.style.zIndex = ++zTop;
  win.innerHTML = `
    <div class="titlebar">
      <button class="tb-btn tb-close" title="Close"></button>
      <button class="tb-btn tb-min"   title="Minimize"></button>
      <button class="tb-btn tb-max"   title="Maximize"></button>
      <div class="tb-title">${title}</div>
    </div>
    <div class="wbody"></div>
  `;
  win.querySelector('.wbody').appendChild(body);
  document.body.appendChild(win);
  openWindows[id] = win;

  // 3. Draggable
  const bar = win.querySelector('.titlebar');
  let dragging = false, ox=0, oy=0;
  bar.addEventListener('pointerdown', e => {
    if (e.target.classList.contains('tb-btn')) return;
    dragging = true; ox = e.clientX - win.offsetLeft; oy = e.clientY - win.offsetTop;
    bar.setPointerCapture(e.pointerId); focusWindow(win);
  });
  bar.addEventListener('pointermove', e => {
    if (!dragging) return;
    win.style.left = Math.max(0, Math.min(window.innerWidth - 60, e.clientX - ox)) + 'px';
    win.style.top  = Math.max(32, Math.min(window.innerHeight - 40, e.clientY - oy)) + 'px';
  });
  bar.addEventListener('pointerup', e => { dragging = false; });

  // 3. Closable
  win.querySelector('.tb-close').onclick = () => { win.remove(); delete openWindows[id]; };
  win.querySelector('.tb-min').onclick = () => { win.style.display = 'none'; };
  let maximized = false, prev = {};
  win.querySelector('.tb-max').onclick = () => {
    if (!maximized) {
      prev = { l: win.style.left, t: win.style.top, w: win.style.width, h: win.style.height };
      win.style.left='0'; win.style.top='32px'; win.style.width='100vw'; win.style.height='calc(100vh - 32px)';
    } else {
      Object.assign(win.style, { left: prev.l, top: prev.t, width: prev.w, height: prev.h });
    }
    maximized = !maximized;
  };

  win.addEventListener('pointerdown', () => focusWindow(win));
  return win;
}
function focusWindow(win) { win.style.zIndex = ++zTop; win.style.display='flex'; }

function openNotes() {

  ta.placeholder = 'Schreibe deine Gedanken im All...';
  ta.value = localStorage.getItem('spaceos.notes') || '';
  ta.addEventListener('input', () => localStorage.setItem('spaceos.notes', ta.value));
  body.appendChild(ta);
  createWindow({ id:'notes', title:'📝 Notes', width:380, height:300, x:100, y:80, body });
}

/* ---------- 5. Cosmic Paint (Advanced app) ---------- */
function openPaint() {
  const body = document.createElement('div');
  body.className = 'paint-app';
  body.innerHTML = `
    <div class="paint-tools">
      <input type="color" id="pColor" value="#7c3aed" />
      <input type="range" id="pSize" min="1" max="40" value="6" />
      <button id="pClear">Clear</button>
      <button id="pSave">Save PNG</button>
    </div>
    <canvas id="pCanvas" width="600" height="380"></canvas>
  `;
  createWindow({ id:'paint', title:'🎨 Cosmic Paint', width:640, height:480, x:180, y:110, body });

  const canvas = body.querySelector('#pCanvas');
  const ctx = canvas.getContext('2d');
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  let drawing = false;
  const getPos = e => {
    const r = canvas.getBoundingClientRect();
    return { x: (e.clientX - r.left) * (canvas.width / r.width),
             y: (e.clientY - r.top)  * (canvas.height / r.height) };
  };
  canvas.addEventListener('pointerdown', e => {
    drawing = true; const p = getPos(e);
    ctx.strokeStyle = body.querySelector('#pColor').value;
    ctx.lineWidth   = body.querySelector('#pSize').value;
    ctx.beginPath(); ctx.moveTo(p.x, p.y);
    canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener('pointermove', e => {
    if (!drawing) return;
    const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke();
  });
  canvas.addEventListener('pointerup', () => drawing = false);
  body.querySelector('#pClear').onclick = () => ctx.clearRect(0,0,canvas.width,canvas.height);
  body.querySelector('#pSave').onclick = () => {
    const a = document.createElement('a');
    a.download = 'spaceos-art.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  };
}

/* ---------- Desktop icon launchers ---------- */
document.querySelectorAll('.dicon').forEach(el => {
  el.addEventListener('dblclick', () => launch(el.dataset.app));
  let tap = 0;
  el.addEventListener('click', () => {
    const now = Date.now();
    if (now - tap < 350) launch(el.dataset.app);
    tap = now;
  });
});
function launch(app) {
  if (app === 'notes') openNotes();
  if (app === 'paint') openPaint();
  if (app === 'about') openAbout();
}
