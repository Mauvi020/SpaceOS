<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
<title>SpaceOS</title>
<style>
:root{
  --bg:#0b1020; --panel:rgba(20,24,40,.72); --panel-2:rgba(255,255,255,.08);
  --text:#eef2ff; --muted:#9aa3c7; --accent:#7c9cff; --accent-ink:#0b1020;
  --border:rgba(255,255,255,.12); --radius:14px; --font-size:14px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;color:var(--text);font:var(--font-size)/1.4 -apple-system,BlinkMacSystemFont,"SF Pro Text","Inter",system-ui,sans-serif;-webkit-user-select:none;user-select:none}
button,input,textarea,select{font:inherit;color:inherit}
button{cursor:pointer;background:transparent;border:0;color:var(--text)}
img{display:block}
a{color:var(--accent)}

#desktop{position:fixed;inset:0;background:var(--wallpaper, radial-gradient(1200px 800px at 20% 10%, #1b2350 0%, #0b1020 60%, #06091a 100%));background-size:cover;background-position:center}

/* Top bar */
#topbar{position:fixed;top:0;left:0;right:0;height:28px;z-index:9000;display:flex;align-items:center;gap:4px;padding:0 10px;background:rgba(10,12,24,.55);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--border);font-size:12px}
#topbar .mi{padding:2px 10px;border-radius:6px;cursor:pointer}
#topbar .mi:hover,#topbar .mi.open{background:rgba(255,255,255,.15)}
#topbar .mi.brand{display:flex;align-items:center;gap:6px;font-weight:600}
#topbar .mi.brand .logo{width:12px;height:12px;border-radius:3px;background:linear-gradient(135deg,var(--accent),#b58bff)}
#topbar .spacer{flex:1}
#clock{font-variant-numeric:tabular-nums;padding:0 8px}

/* Menu dropdown */
.menu{position:fixed;top:28px;background:rgba(20,24,40,.92);backdrop-filter:blur(22px);border:1px solid var(--border);border-radius:10px;min-width:200px;padding:6px;z-index:9500;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.menu button{display:block;width:100%;text-align:left;padding:7px 10px;border-radius:6px;font-size:13px}
.menu button:hover{background:var(--accent);color:var(--accent-ink)}
.menu .sep{height:1px;background:var(--border);margin:4px 2px}
.menu .ks{float:right;color:var(--muted);font-size:11px}

/* Launchpad */
#launchpad{position:fixed;inset:0;z-index:9400;background:rgba(8,10,22,.7);backdrop-filter:blur(28px);display:none;align-items:center;justify-content:center;animation:fade .15s}
@keyframes fade{from{opacity:0}to{opacity:1}}
#launchpad.show{display:flex}
#launchpad .grid{display:grid;grid-template-columns:repeat(5,110px);gap:24px;padding:24px}
#launchpad .lp{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;padding:8px;border-radius:14px}
#launchpad .lp:hover{background:rgba(255,255,255,.08)}
#launchpad .lp .ph{width:72px;height:72px;border-radius:18px}
#launchpad .lp .lbl{font-size:12px}

/* Desktop icons (draggable, free positioning) */
.dicon{position:absolute;width:84px;display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 4px;border-radius:10px;text-align:center;font-size:11px;color:#e9ecff;text-shadow:0 1px 2px rgba(0,0,0,.5);cursor:grab}
.dicon:hover{background:rgba(255,255,255,.08)}
.dicon.dragging{opacity:.7;cursor:grabbing;z-index:8000}
.dicon .lbl{max-width:80px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* App icon placeholders (no emoji) */
.ph{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#2a335f,#1a1f3d);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:#cfd6ff;font-weight:600;font-size:18px;letter-spacing:.5px;flex:0 0 auto}
.ph.notes{background:linear-gradient(135deg,#fff6c0,#f7d774);color:#5a4500;border-color:transparent}
.ph.todo{background:linear-gradient(135deg,#ff8585,#e63b3b);color:#fff;border-color:transparent}
.ph.browser{background:linear-gradient(135deg,#7ad3ff,#3a7bd5);color:#fff;border-color:transparent}
.ph.dino{background:linear-gradient(135deg,#ededed,#8a8a8a);color:#222;border-color:transparent}
.ph.spotify{background:#1db954;color:#000;border-color:transparent}
.ph.github{background:#0d1117;color:#fff;border-color:#30363d}
.ph.settings{background:linear-gradient(135deg,#aab1d0,#5a6190);color:#fff;border-color:transparent}
.ph.files{background:linear-gradient(135deg,#5fc0ff,#1668c8);color:#fff;border-color:transparent}

/* Window */
.window{position:absolute;min-width:280px;min-height:180px;width:560px;height:380px;background:var(--panel);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 30px 60px rgba(0,0,0,.45),0 2px 0 rgba(255,255,255,.04) inset;display:flex;flex-direction:column;animation:pop .18s ease-out}
@keyframes pop{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
.window.min{display:none}
.titlebar{height:32px;display:flex;align-items:center;gap:8px;padding:0 10px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,0));border-bottom:1px solid var(--border);cursor:grab}
.titlebar.drag{cursor:grabbing}
.tbtns{display:flex;gap:6px}
.tbtn{width:12px;height:12px;border-radius:50%;border:1px solid rgba(0,0,0,.25)}
.tbtn.c{background:#ff5f57}.tbtn.m{background:#febc2e}.tbtn.z{background:#28c840}
.ttitle{font-size:12px;color:var(--muted);margin-left:6px}
.wcontent{flex:1;overflow:auto;background:rgba(0,0,0,.15)}

/* Dock */
#dock{position:fixed;left:50%;bottom:10px;transform:translateX(-50%);display:flex;gap:8px;padding:8px 10px;background:rgba(20,24,40,.55);backdrop-filter:blur(22px);border:1px solid var(--border);border-radius:18px;z-index:9000;box-shadow:0 20px 50px rgba(0,0,0,.45);max-width:calc(100vw - 20px)}
.dock-item{position:relative;width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#2a335f,#1a1f3d);border:1px solid var(--border);color:#cfd6ff;font-weight:600;transition:transform .15s;cursor:pointer;flex:0 0 auto}
.dock-item:hover{transform:translateY(-6px) scale(1.08)}
.dock-item.dragging{opacity:.4}
.dock-item .ph{width:100%;height:100%;border-radius:12px}
.dock-item .dot{position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent);opacity:0}
.dock-item.active .dot{opacity:1}

/* Welcome */
#welcome{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;background:radial-gradient(800px 600px at 50% 40%,#1b2350,#06091a)}
#welcome .card{text-align:center;padding:40px 50px;border:1px solid var(--border);border-radius:20px;background:rgba(20,24,40,.6);backdrop-filter:blur(18px)}
#welcome h1{margin:0 0 6px;font-size:28px;letter-spacing:.5px;font-weight:600}
#welcome p{margin:0 0 22px;color:var(--muted);font-size:13px}
#welcome .logo{width:64px;height:64px;border-radius:16px;margin:0 auto 16px;background:linear-gradient(135deg,var(--accent),#b58bff)}
#welcome button{padding:10px 22px;border-radius:10px;background:var(--accent);color:var(--accent-ink);font-weight:600}

/* Forms */
input[type=text],input[type=url],input[type=search],textarea,select{width:100%;background:rgba(0,0,0,.25);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:none}
.row{display:flex;gap:8px;align-items:center}
.btn{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text)}
.btn:hover{background:rgba(255,255,255,.12)}
.btn.primary{background:var(--accent);color:var(--accent-ink);border-color:transparent;font-weight:600}

/* Notes */
.notes-wrap{display:grid;grid-template-columns:180px 1fr;height:100%}
.notes-list{border-right:1px solid var(--border);overflow:auto;background:rgba(0,0,0,.15)}
.notes-list .n{padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;font-size:12px}
.notes-list .n.active{background:color-mix(in srgb,var(--accent) 22%,transparent)}
.notes-list .n .t{font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.notes-list .n .s{color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.notes-edit{display:flex;flex-direction:column;padding:10px;gap:8px;height:100%}
.notes-edit input{font-weight:600}
.notes-edit textarea{flex:1;background:transparent;border:0;padding:0}
.notes-edit .bar{display:flex;gap:6px}

/* Todo */
.todo{padding:14px;display:flex;flex-direction:column;gap:10px;height:100%}
.todo .add{display:flex;gap:8px}
.todo ul{list-style:none;padding:0;margin:0;overflow:auto;flex:1}
.todo li{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border)}
.todo .check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--muted);flex:0 0 auto;display:flex;align-items:center;justify-content:center}
.todo li.done .check{background:var(--accent);border-color:var(--accent)}
.todo li.done .check::after{content:"";width:8px;height:4px;border:2px solid var(--accent-ink);border-top:0;border-right:0;transform:rotate(-45deg);margin-top:-2px}
.todo li.done .text{text-decoration:line-through;color:var(--muted)}
.todo .text{flex:1}
.todo .del{opacity:.5}
.todo .del:hover{opacity:1;color:#ff6b6b}

/* Browser */
.browser{display:flex;flex-direction:column;height:100%}
.browser .bar{display:flex;gap:6px;padding:8px;border-bottom:1px solid var(--border);background:rgba(0,0,0,.2)}
.browser iframe{flex:1;border:0;background:#fff;width:100%}
.browser .notice{padding:14px;color:var(--muted);font-size:12px;background:rgba(0,0,0,.3);border-bottom:1px solid var(--border)}

/* Settings */
.settings{display:grid;grid-template-columns:160px 1fr;height:100%}
.set-side{border-right:1px solid var(--border);background:rgba(0,0,0,.15);padding:8px;overflow:auto}
.set-side button{display:block;width:100%;text-align:left;padding:8px 10px;border-radius:8px;color:var(--text);font-size:13px}
.set-side button.active{background:color-mix(in srgb,var(--accent) 25%,transparent)}
.set-main{padding:18px;overflow:auto}
.set-main h3{margin:0 0 10px;font-size:14px;font-weight:600}
.set-main section{margin-bottom:22px}
.set-main label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
.swatches{display:flex;gap:8px;flex-wrap:wrap}
.swatch{width:32px;height:32px;border-radius:50%;border:2px solid transparent;cursor:pointer}
.swatch.active{border-color:#fff}

/* Dino */
.dino-wrap{display:flex;flex-direction:column;height:100%;background:#f7f7f7;color:#535353}
.dino-wrap canvas{flex:1;width:100%;display:block;image-rendering:pixelated}
.dino-wrap .hint{padding:6px;font-size:11px;text-align:center;background:#fff;border-top:1px solid #ddd}

/* Landing app (Spotify/GitHub) */
.landing{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;padding:30px;text-align:center}
.landing .big{width:96px;height:96px;border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:700}
.landing h2{margin:0;font-size:20px}
.landing p{margin:0;color:var(--muted);font-size:13px;max-width:340px}

/* Files */
.files{display:grid;grid-template-columns:160px 1fr;height:100%}
.files .side{border-right:1px solid var(--border);background:rgba(0,0,0,.15);padding:8px;overflow:auto}
.files .side button{display:block;width:100%;text-align:left;padding:8px 10px;border-radius:8px;font-size:13px}
.files .side button.active{background:color-mix(in srgb,var(--accent) 22%,transparent)}
.files .main{padding:14px;overflow:auto}
.files .grid{display:grid;grid-template-columns:repeat(auto-fill,80px);gap:12px}
.files .f{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:11px;text-align:center}
.files .f .ic{width:48px;height:60px;background:linear-gradient(135deg,#fff,#cfd6ff);border-radius:6px;color:#1a1f3d;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px}

::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:10px}
::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>

<div id="desktop"></div>

<div id="topbar">
  <div class="mi brand" data-menu="apple"><span class="logo"></span><span>SpaceOS</span></div>
  <div class="mi" data-menu="file">File</div>
  <div class="mi" data-menu="edit">Edit</div>
  <div class="mi" data-menu="view">View</div>
  <div class="spacer"></div>
  <div class="mi" id="clock">--:--</div>
</div>

<div id="icons"></div>
<div id="launchpad"><div class="grid" id="lpGrid"></div></div>
<div id="dock"></div>

<div id="welcome">
  <div class="card">
    <div class="logo"></div>
    <h1>SpaceOS</h1>
    <p data-i18n="welcome">A tiny desktop in your browser.</p>
    <button id="enter" data-i18n="enter">Enter</button>
  </div>
</div>

<script>
/* ============ Storage ============ */
const LS = {
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}},
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))
};

/* ============ i18n ============ */
const I18N = {
  en:{welcome:"A tiny desktop in your browser.",enter:"Enter",notes:"Notes",todo:"Reminders",browser:"Browser",dino:"Dino",settings:"Settings",spotify:"Spotify",github:"GitHub",files:"Files",newnote:"New note",addtodo:"Add a reminder...",appearance:"Appearance",system:"System",language:"Language",accent:"Accent color",textsize:"Text size",iconsize:"Icon size",wallpaper:"Wallpaper",upload:"Upload image",reset:"Reset"},
  de:{welcome:"Ein kleiner Desktop im Browser.",enter:"Starten",notes:"Notizen",todo:"Erinnerungen",browser:"Browser",dino:"Dino",settings:"Einstellungen",spotify:"Spotify",github:"GitHub",files:"Dateien",newnote:"Neue Notiz",addtodo:"Erinnerung hinzufügen...",appearance:"Aussehen",system:"System",language:"Sprache",accent:"Akzentfarbe",textsize:"Textgröße",iconsize:"Icon-Größe",wallpaper:"Hintergrund",upload:"Bild hochladen",reset:"Zurücksetzen"},
  es:{welcome:"Un pequeño escritorio en tu navegador.",enter:"Entrar",notes:"Notas",todo:"Recordatorios",browser:"Navegador",dino:"Dino",settings:"Ajustes",spotify:"Spotify",github:"GitHub",files:"Archivos",newnote:"Nueva nota",addtodo:"Añadir recordatorio...",appearance:"Apariencia",system:"Sistema",language:"Idioma",accent:"Color de acento",textsize:"Tamaño de texto",iconsize:"Tamaño de iconos",wallpaper:"Fondo",upload:"Subir imagen",reset:"Restablecer"}
};
let lang = LS.get("lang","en");
const t = k => (I18N[lang]&&I18N[lang][k])||I18N.en[k]||k;
function applyI18n(){
  document.querySelectorAll("[data-i18n]").forEach(el=>el.textContent=t(el.dataset.i18n));
  renderIcons();renderDock();
}

/* ============ Settings ============ */
const settings = Object.assign({
  accent:"#7c9cff", accentInk:"#0b1020", fontSize:14, iconSize:48, lang:"en",
  wallpaper:null, dock:["notes","todo","browser","files","dino","spotify","github","settings"],
  desktop:{}, // {appName: {x,y}}
}, LS.get("settings",{}));
lang = settings.lang || "en";

function applySettings(){
  const r=document.documentElement.style;
  r.setProperty("--accent",settings.accent);
  r.setProperty("--accent-ink",settings.accentInk||"#0b1020");
  r.setProperty("--font-size",settings.fontSize+"px");
  const d=document.getElementById("desktop");
  if(settings.wallpaper) d.style.background=`url(${settings.wallpaper}) center/cover no-repeat`;
  else d.style.background="";
}
function saveSettings(){LS.set("settings",settings);applySettings();}

/* ============ Clock ============ */
function tick(){const d=new Date();document.getElementById("clock").textContent=d.toLocaleString(undefined,{weekday:"short",hour:"2-digit",minute:"2-digit"})}
setInterval(tick,1000);tick();

/* ============ Apps ============ */
const APPS = {
  notes:{label:"notes",icon:"notes",letter:"N",build:buildNotes,w:620,h:420},
  todo:{label:"todo",icon:"todo",letter:"R",build:buildTodo,w:420,h:480},
  browser:{label:"browser",icon:"browser",letter:"B",build:buildBrowser,w:820,h:540},
  files:{label:"files",icon:"files",letter:"F",build:buildFiles,w:620,h:420},
  dino:{label:"dino",icon:"dino",letter:"D",build:buildDino,w:640,h:280},
  spotify:{label:"spotify",icon:"spotify",letter:"S",build:buildSpotify,w:520,h:380},
  github:{label:"github",icon:"github",letter:"G",build:buildGithub,w:520,h:380},
  settings:{label:"settings",icon:"settings",letter:"S",build:buildSettings,w:640,h:460},
};

/* ============ Desktop icons (free position, draggable) ============ */
function defaultDesktopPos(){
  let i=0;const pos={};
  Object.keys(APPS).forEach(k=>{
    if(!settings.desktop[k]){
      const col=Math.floor(i/6),row=i%6;
      pos[k]={x:14+col*96,y:44+row*92};
    }
    i++;
  });
  Object.assign(settings.desktop, pos);
}
defaultDesktopPos();

function renderIcons(){
  const c=document.getElementById("icons");c.innerHTML="";c.style.position="absolute";c.style.inset="0";
  Object.entries(APPS).forEach(([key,app])=>{
    const p=settings.desktop[key]||{x:14,y:44};
    const el=document.createElement("div");el.className="dicon";el.style.left=p.x+"px";el.style.top=p.y+"px";el.dataset.app=key;
    el.innerHTML=`<div class="ph ${app.icon}">${app.letter}</div><div class="lbl">${t(app.label)}</div>`;
    let down=false,sx,sy,ox,oy,moved=false;
    const start=e=>{down=true;moved=false;el.classList.add("dragging");
      const pt=e.touches?e.touches[0]:e;sx=pt.clientX;sy=pt.clientY;ox=p.x;oy=p.y;
    };
    const move=e=>{if(!down)return;const pt=e.touches?e.touches[0]:e;
      const dx=pt.clientX-sx,dy=pt.clientY-sy;
      if(Math.abs(dx)+Math.abs(dy)>4)moved=true;
      p.x=Math.max(0,ox+dx);p.y=Math.max(30,oy+dy);
      el.style.left=p.x+"px";el.style.top=p.y+"px";
    };
    const end=()=>{if(!down)return;down=false;el.classList.remove("dragging");
      if(moved){settings.desktop[key]=p;saveSettings();}
    };
    el.addEventListener("mousedown",start);el.addEventListener("touchstart",start,{passive:true});
    window.addEventListener("mousemove",move);window.addEventListener("touchmove",move,{passive:true});
    window.addEventListener("mouseup",end);window.addEventListener("touchend",end);
    let lastTap=0;
    el.addEventListener("dblclick",()=>!moved&&openApp(key));
    el.addEventListener("click",()=>{if(moved)return;const n=Date.now();if(n-lastTap<350)openApp(key);lastTap=n});
    c.appendChild(el);
  });
}

/* ============ Dock (toggle open/close, drag to remove, reorder) ============ */
function renderDock(){
  const dock=document.getElementById("dock");dock.innerHTML="";
  // ensure unique + valid
  settings.dock=[...new Set(settings.dock.filter(k=>APPS[k]))];
  settings.dock.forEach(key=>{
    const app=APPS[key];
    const el=document.createElement("div");
    el.className="dock-item"+(openWindows[key]?" active":"");
    el.draggable=true;el.dataset.app=key;el.title=t(app.label);
    el.innerHTML=`<div class="ph ${app.icon}">${app.letter}</div><span class="dot"></span>`;
    el.addEventListener("click",()=>toggleApp(key));
    el.addEventListener("dragstart",e=>{el.classList.add("dragging");e.dataTransfer.setData("text/plain",key);e.dataTransfer.effectAllowed="move"});
    el.addEventListener("dragend",e=>{
      el.classList.remove("dragging");
      // if dropped outside dock → remove from dock and place icon on desktop
      const r=dock.getBoundingClientRect();
      const outside=e.clientY<r.top-20||e.clientY>r.bottom+20||e.clientX<r.left-20||e.clientX>r.right+20;
      if(outside){
        settings.dock=settings.dock.filter(k=>k!==key);
        // place desktop icon at drop point
        settings.desktop[key]={x:Math.max(0,e.clientX-40),y:Math.max(30,e.clientY-40)};
        saveSettings();renderIcons();renderDock();
      }
    });
    el.addEventListener("dragover",e=>{e.preventDefault();
      const dragging=document.querySelector(".dock-item.dragging");
      if(!dragging||dragging===el)return;
      const r=el.getBoundingClientRect();
      const after=(e.clientX-r.left)>r.width/2;
      dock.insertBefore(dragging,after?el.nextSibling:el);
    });
    dock.appendChild(el);
  });
  dock.ondrop=e=>{
    e.preventDefault();
    const key=e.dataTransfer.getData("text/plain");
    const order=[...dock.querySelectorAll(".dock-item")].map(x=>x.dataset.app);
    // if dragged from desktop/launchpad and not in dock, add
    if(key&&!order.includes(key))order.push(key);
    settings.dock=order;saveSettings();renderDock();
  };
  dock.ondragover=e=>e.preventDefault();
}

/* ============ Window manager ============ */
const openWindows={};
let zTop=100;
function toggleApp(name){
  if(openWindows[name]){closeApp(name);}else{openApp(name);}
}
function closeApp(name){
  const w=openWindows[name];if(!w)return;
  w.remove();delete openWindows[name];renderDock();
}
function openApp(name){
  document.getElementById("launchpad").classList.remove("show");
  if(openWindows[name]){focusWin(openWindows[name]);return;}
  const app=APPS[name];
  const w=document.createElement("div");w.className="window";
  w.style.width=app.w+"px";w.style.height=app.h+"px";
  const x=80+Math.random()*120, y=60+Math.random()*80;
  w.style.left=x+"px";w.style.top=y+"px";w.style.zIndex=++zTop;
  w.innerHTML=`<div class="titlebar"><div class="tbtns"><button class="tbtn c" data-act="close"></button><button class="tbtn m" data-act="min"></button><button class="tbtn z" data-act="zoom"></button></div><div class="ttitle">${t(app.label)}</div></div><div class="wcontent"></div>`;
  document.body.appendChild(w);
  const content=w.querySelector(".wcontent");
  app.build(content,w);
  w.querySelector("[data-act=close]").onclick=()=>closeApp(name);
  w.querySelector("[data-act=min]").onclick=()=>{w.classList.toggle("min");renderDock();};
  w.querySelector("[data-act=zoom]").onclick=()=>{
    if(w._zoom){Object.assign(w.style,w._zoom);w._zoom=null}
    else{w._zoom={left:w.style.left,top:w.style.top,width:w.style.width,height:w.style.height};
      Object.assign(w.style,{left:"0px",top:"28px",width:"100vw",height:"calc(100vh - 28px)"});}
  };
  const tb=w.querySelector(".titlebar");
  let sx,sy,ox,oy,drag=false;
  const down=e=>{drag=true;tb.classList.add("drag");w.style.zIndex=++zTop;const p=e.touches?e.touches[0]:e;sx=p.clientX;sy=p.clientY;ox=parseFloat(w.style.left);oy=parseFloat(w.style.top);e.preventDefault()};
  const move=e=>{if(!drag)return;const p=e.touches?e.touches[0]:e;w.style.left=(ox+p.clientX-sx)+"px";w.style.top=Math.max(28,(oy+p.clientY-sy))+"px"};
  const up=()=>{drag=false;tb.classList.remove("drag")};
  tb.addEventListener("mousedown",down);tb.addEventListener("touchstart",down,{passive:false});
  window.addEventListener("mousemove",move);window.addEventListener("touchmove",move,{passive:false});
  window.addEventListener("mouseup",up);window.addEventListener("touchend",up);
  w.addEventListener("mousedown",()=>{w.style.zIndex=++zTop});
  openWindows[name]=w;renderDock();
}
function focusWin(w){w.classList.remove("min");w.style.zIndex=++zTop;renderDock();}

/* ============ Top bar menus ============ */
let openMenu=null;
function closeMenu(){if(openMenu){openMenu.el.remove();openMenu.trigger.classList.remove("open");openMenu=null}}
document.addEventListener("click",e=>{if(!e.target.closest(".menu")&&!e.target.closest(".mi"))closeMenu()});
document.querySelectorAll("#topbar .mi[data-menu]").forEach(mi=>{
  mi.addEventListener("click",e=>{e.stopPropagation();
    const name=mi.dataset.menu;
    if(openMenu&&openMenu.name===name){closeMenu();return}
    closeMenu();
    const m=document.createElement("div");m.className="menu";
    const r=mi.getBoundingClientRect();m.style.left=r.left+"px";
    m.innerHTML=menuHTML(name);
    document.body.appendChild(m);
    mi.classList.add("open");openMenu={el:m,trigger:mi,name};
    m.querySelectorAll("button[data-cmd]").forEach(b=>b.onclick=()=>{runCmd(b.dataset.cmd);closeMenu()});
  });
});
function menuHTML(name){
  if(name==="apple") return `
    <button data-cmd="launchpad">All Apps<span class="ks">⇧⌘A</span></button>
    <div class="sep"></div>
    <button data-cmd="openSettings">${t("settings")}</button>
    <button data-cmd="about">About SpaceOS</button>
    <div class="sep"></div>
    <button data-cmd="closeAll">Close All Windows</button>
    <button data-cmd="reload">Restart</button>`;
  if(name==="file") return `
    <button data-cmd="newNote">New Note<span class="ks">⌘N</span></button>
    <button data-cmd="newTodo">New Reminder</button>
    <div class="sep"></div>
    <button data-cmd="openSettings">Open Settings</button>
    <button data-cmd="closeFront">Close Window<span class="ks">⌘W</span></button>`;
  if(name==="edit") return `
    <button data-cmd="undo">Undo<span class="ks">⌘Z</span></button>
    <button data-cmd="redo">Redo<span class="ks">⇧⌘Z</span></button>
    <div class="sep"></div>
    <button data-cmd="cut">Cut</button>
    <button data-cmd="copy">Copy</button>
    <button data-cmd="paste">Paste</button>
    <button data-cmd="selectAll">Select All</button>`;
  if(name==="view") return `
    <button data-cmd="launchpad">Show Launchpad</button>
    <button data-cmd="zoomFront">Zoom Window</button>
    <button data-cmd="minimizeFront">Minimize Window</button>
    <div class="sep"></div>
    <button data-cmd="fullscreen">Toggle Fullscreen</button>`;
  return "";
}
function frontWindow(){
  let best=null,z=-1;
  Object.values(openWindows).forEach(w=>{const cz=+w.style.zIndex||0;if(cz>z&&!w.classList.contains("min")){z=cz;best=w}});
  return best;
}
function runCmd(cmd){
  switch(cmd){
    case "launchpad":toggleLaunchpad();break;
    case "openSettings":openApp("settings");break;
    case "about":alert("SpaceOS — runs entirely in your browser.\nAll data is stored locally.");break;
    case "closeAll":Object.keys(openWindows).forEach(closeApp);break;
    case "reload":location.reload();break;
    case "newNote":openApp("notes");break;
    case "newTodo":openApp("todo");break;
    case "closeFront":{const w=frontWindow();if(w){const k=Object.keys(openWindows).find(k=>openWindows[k]===w);if(k)closeApp(k)}break}
    case "undo":document.execCommand("undo");break;
    case "redo":document.execCommand("redo");break;
    case "cut":document.execCommand("cut");break;
    case "copy":document.execCommand("copy");break;
    case "paste":document.execCommand("paste");break;
    case "selectAll":document.execCommand("selectAll");break;
    case "zoomFront":{const w=frontWindow();if(w)w.querySelector("[data-act=zoom]").click();break}
    case "minimizeFront":{const w=frontWindow();if(w)w.querySelector("[data-act=min]").click();break}
    case "fullscreen":if(!document.fullscreenElement)document.documentElement.requestFullscreen?.();else document.exitFullscreen?.();break;
  }
}

/* ============ Launchpad ============ */
function toggleLaunchpad(){
  const lp=document.getElementById("launchpad");
  if(lp.classList.contains("show")){lp.classList.remove("show");return}
  const g=document.getElementById("lpGrid");g.innerHTML="";
  Object.entries(APPS).forEach(([key,app])=>{
    const el=document.createElement("div");el.className="lp";
    el.innerHTML=`<div class="ph ${app.icon}" style="width:72px;height:72px;border-radius:18px;font-size:26px">${app.letter}</div><div class="lbl">${t(app.label)}</div>`;
    el.onclick=()=>openApp(key);
    g.appendChild(el);
  });
  lp.classList.add("show");
}
document.getElementById("launchpad").addEventListener("click",e=>{if(e.target.id==="launchpad")e.currentTarget.classList.remove("show")});

/* ============ Notes ============ */
function buildNotes(root){
  root.innerHTML=`<div class="notes-wrap"><div class="notes-list"></div><div class="notes-edit"><div class="bar"><button class="btn" id="nNew">${t("newnote")}</button><button class="btn" id="nDel">Delete</button></div><input id="nTitle" type="text" placeholder="Title"><textarea id="nBody" placeholder="..."></textarea></div></div>`;
  let notes=LS.get("notes",[]);let active=notes[0]?.id;
  const list=root.querySelector(".notes-list");
  const tEl=root.querySelector("#nTitle"),bEl=root.querySelector("#nBody");
  function save(){LS.set("notes",notes)}
  function render(){
    list.innerHTML="";
    notes.forEach(n=>{
      const d=document.createElement("div");d.className="n"+(n.id===active?" active":"");
      d.innerHTML=`<div class="t"></div><div class="s"></div>`;
      d.querySelector(".t").textContent=n.title||"Untitled";
      d.querySelector(".s").textContent=(n.body||"").slice(0,40);
      d.onclick=()=>{active=n.id;render()};list.appendChild(d);
    });
    const cur=notes.find(x=>x.id===active);
    tEl.value=cur?.title||"";bEl.value=cur?.body||"";
  }
  tEl.oninput=()=>{const n=notes.find(x=>x.id===active);if(!n)return;n.title=tEl.value;save();render()};
  bEl.oninput=()=>{const n=notes.find(x=>x.id===active);if(!n)return;n.body=bEl.value;save()};
  root.querySelector("#nNew").onclick=()=>{const n={id:Date.now(),title:"Untitled",body:""};notes.unshift(n);active=n.id;save();render()};
  root.querySelector("#nDel").onclick=()=>{notes=notes.filter(x=>x.id!==active);active=notes[0]?.id;save();render()};
  if(!notes.length){notes=[{id:Date.now(),title:"Welcome",body:"Your notes save automatically."}];active=notes[0].id;save()}
  render();
}

/* ============ Todo ============ */
function buildTodo(root){
  root.innerHTML=`<div class="todo"><div class="add"><input id="tInp" type="text" placeholder="${t("addtodo")}"><button class="btn primary" id="tAdd">Add</button></div><ul id="tList"></ul></div>`;
  let items=LS.get("todo",[]);
  const list=root.querySelector("#tList"),inp=root.querySelector("#tInp");
  function save(){LS.set("todo",items)}
  function render(){list.innerHTML="";items.forEach(it=>{const li=document.createElement("li");if(it.done)li.classList.add("done");li.innerHTML=`<button class="check"></button><span class="text"></span><button class="del">×</button>`;li.querySelector(".text").textContent=it.text;li.querySelector(".check").onclick=()=>{it.done=!it.done;save();render()};li.querySelector(".del").onclick=()=>{items=items.filter(x=>x!==it);save();render()};list.appendChild(li)})}
  function add(){const v=inp.value.trim();if(!v)return;items.push({text:v,done:false});inp.value="";save();render()}
  root.querySelector("#tAdd").onclick=add;inp.addEventListener("keydown",e=>{if(e.key==="Enter")add()});render();
}

/* ============ Browser ============ */
function buildBrowser(root){
  root.innerHTML=`<div class="browser">
    <div class="bar">
      <button class="btn" id="bBack">‹</button>
      <button class="btn" id="bFwd">›</button>
      <button class="btn" id="bGo">Go</button>
      <input id="bUrl" type="text" placeholder="Search or enter URL">
      <button class="btn" id="bExt" title="Open in new tab">↗</button>
    </div>
    <div class="notice">Some sites (like google.com, spotify, github) block embedding. Use ↗ to open in a new tab.</div>
    <iframe id="bFrame" referrerpolicy="no-referrer" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>
  </div>`;
  const f=root.querySelector("#bFrame"),u=root.querySelector("#bUrl");
  function toUrl(v){v=v.trim();if(!v)return "";
    if(/^(https?:)?\/\//.test(v))return v.startsWith("http")?v:"https:"+v;
    if(/^[\w-]+(\.[\w-]+)+(\/|$)/.test(v))return "https://"+v;
    return "https://duckduckgo.com/?q="+encodeURIComponent(v);
  }
  const go=()=>{const v=toUrl(u.value);if(!v)return;u.value=v;f.src=v};
  u.addEventListener("keydown",e=>{if(e.key==="Enter")go()});
  root.querySelector("#bGo").onclick=go;
  root.querySelector("#bBack").onclick=()=>{try{f.contentWindow.history.back()}catch(e){}};
  root.querySelector("#bFwd").onclick=()=>{try{f.contentWindow.history.forward()}catch(e){}};
  root.querySelector("#bExt").onclick=()=>{const v=toUrl(u.value);if(v)window.open(v,"_blank","noopener")};
  u.value="https://duckduckgo.com";go();
}

/* ============ Settings ============ */
function buildSettings(root){
  root.innerHTML=`<div class="settings"><div class="set-side"><button class="active" data-tab="app">${t("appearance")}</button><button data-tab="sys">${t("system")}</button></div><div class="set-main" id="setMain"></div></div>`;
  const main=root.querySelector("#setMain");

    app:()=>{
      main.innerHTML=`
        <section><h3>${t("accent")}</h3><div class="swatches" id="sw"></div></section>
        <section><h3>${t("textsize")}</h3><input type="range" min="12" max="20" step="1" id="fs" value="${settings.fontSize}"><div style="color:var(--muted);font-size:12px"><span id="fsv">${settings.fontSize}</span>px</div></section>
        <section><h3>${t("wallpaper")}</h3><div class="row"><input type="file" id="wp" accept="image/*"><button class="btn" id="wpR">${t("reset")}</button></div></section>`;
      const colors=[["#7c9cff","#0b1020"],["#ff6b6b","#fff"],["#1db954","#000"],["#febc2e","#222"],["#b58bff","#1a0e2e"],["#28c840","#0b1020"],["#ff8c42","#1a0a00"],["#ffffff","#000"]];
      const sw=main.querySelector("#sw");
      colors.forEach(([c,ink])=>{const b=document.createElement("button");b.className="swatch"+(c===settings.accent?" active":"");b.style.background=c;b.onclick=()=>{settings.accent=c;settings.accentInk=ink;saveSettings();tabs.app()};sw.appendChild(b)});
      const fs=main.querySelector("#fs");fs.oninput=()=>{settings.fontSize=+fs.value;main.querySelector("#fsv").textContent=fs.value;saveSettings()};
      main.querySelector("#wp").onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{settings.wallpaper=r.result;saveSettings()};r.readAsDataURL(f)};
      main.querySelector("#wpR").onclick=()=>{settings.wallpaper=null;saveSettings()};
    },
    sys:()=>{
      main.innerHTML=`
        <section><h3>${t("language")}</h3><select id="lng"><option value="en">English</option><option value="de">Deutsch</option><option value="es">Español</option></select></section>
        <section><h3>Storage</h3><button class="btn" id="clr">Clear all data</button></section>
        <section style="color:var(--muted);font-size:12px">SpaceOS — runs entirely in your browser. All data stored locally.</section>`;
      const lng=main.querySelector("#lng");lng.value=lang;

}

/* ============ Dino (Chrome-style) ============ */
function buildDino(root){
  root.innerHTML=`<div class="dino-wrap"><canvas id="dc"></canvas><div class="hint">Space / Tap to jump · Down to duck</div></div>`;
  const cvs=root.querySelector("#dc"),ctx=cvs.getContext("2d");
  let W=600,H=180;
  function resize(){const r=cvs.parentElement.getBoundingClientRect();W=cvs.width=Math.floor(r.width);H=cvs.height=Math.max(140,Math.floor(r.height-22))}
  new ResizeObserver(resize).observe(cvs.parentElement);resize();
  const GROUND=()=>H-20;
  const dino={x:40,y:0,vy:0,duck:false};
  let obstacles=[],clouds=[],speed=6,score=0,hi=LS.get("dinoHi",0),over=false,started=false,frame=0,go=0;
  function reset(){obstacles=[];clouds=[];speed=6;score=0;over=false;dino.y=0;dino.vy=0;started=true}
  function jump(){if(over){reset();return}if(!started){started=true;return}if(dino.y===0)dino.vy=-11.5}
  const kd=e=>{if(!root.isConnected)return;if(e.code==="Space"||e.code==="ArrowUp"){e.preventDefault();jump()}if(e.code==="ArrowDown")dino.duck=true};
  const ku=e=>{if(e.code==="ArrowDown")dino.duck=false};
  window.addEventListener("keydown",kd);window.addEventListener("keyup",ku);
  cvs.addEventListener("touchstart",e=>{e.preventDefault();jump()},{passive:false});
  cvs.addEventListener("mousedown",jump);
  function spawn(){
    if(Math.random()<0.012+speed*0.0008&&(!obstacles.length||W-obstacles[obstacles.length-1].x>200+Math.random()*200)){
      const r=Math.random();
      if(r<0.7){const sz=14+Math.random()*14;obstacles.push({type:"cact",x:W,y:GROUND()-sz,w:10+Math.random()*8,h:sz})}
      else if(score>200)obstacles.push({type:"bird",x:W,y:GROUND()-30-Math.random()*30,w:24,h:14});
      else obstacles.push({type:"cact",x:W,y:GROUND()-22,w:14,h:22});
    }
    if(Math.random()<0.005)clouds.push({x:W,y:20+Math.random()*40});
  }
  function step(){
    frame++;ctx.fillStyle="#f7f7f7";ctx.fillRect(0,0,W,H);
    ctx.fillStyle="#c8c8c8";clouds.forEach(c=>{c.x-=speed*0.3;ctx.fillRect(c.x,c.y,16,4);ctx.fillRect(c.x+4,c.y-3,10,4)});clouds=clouds.filter(c=>c.x>-30);
    go=(go+speed)%24;ctx.fillStyle="#535353";ctx.fillRect(0,GROUND()+2,W,2);
    for(let i=-go;i<W;i+=24){ctx.fillRect(i,GROUND()+6,4,2);ctx.fillRect(i+12,GROUND()+10,2,2)}
    if(!started){ctx.fillStyle="#535353";ctx.font="14px monospace";ctx.textAlign="center";ctx.fillText("Press Space or Tap to start",W/2,H/2);drawDino();requestAnimationFrame(step);return}
    if(!over){dino.vy+=0.6;dino.y+=dino.vy;if(dino.y>0){dino.y=0;dino.vy=0}spawn();obstacles.forEach(o=>o.x-=speed);obstacles=obstacles.filter(o=>o.x+o.w>0);score++;if(score%100===0)speed+=0.3;
      const dw=dino.duck?28:22,dh=dino.duck?16:24;const dx=dino.x,dy=GROUND()-dh+dino.y;
      obstacles.forEach(o=>{if(dx<o.x+o.w&&dx+dw>o.x&&dy<o.y+o.h&&dy+dh>o.y){over=true;if(score>hi){hi=score;LS.set("dinoHi",hi)}}});
    }
    ctx.fillStyle="#535353";obstacles.forEach(o=>{if(o.type==="cact"){ctx.fillRect(o.x,o.y,o.w,o.h);ctx.fillRect(o.x-3,o.y+4,3,8);ctx.fillRect(o.x+o.w,o.y+6,3,8)}else{const wing=Math.floor(frame/8)%2?6:-2;ctx.fillRect(o.x,o.y+4,o.w,4);ctx.fillRect(o.x+8,o.y+wing,8,4);ctx.fillRect(o.x+18,o.y+2,4,2)}});
    drawDino();ctx.fillStyle="#535353";ctx.font="bold 14px monospace";ctx.textAlign="right";ctx.fillText(("HI "+String(hi).padStart(5,"0"))+"  "+String(score).padStart(5,"0"),W-10,22);
    if(over){ctx.textAlign="center";ctx.font="bold 18px monospace";ctx.fillText("G A M E   O V E R",W/2,H/2-6);ctx.font="12px monospace";ctx.fillText("Press Space / Tap to restart",W/2,H/2+14)}
    requestAnimationFrame(step);
  }
  function drawDino(){const dw=dino.duck?28:22,dh=dino.duck?16:24;const x=dino.x,y=GROUND()-dh+dino.y;ctx.fillStyle="#535353";ctx.fillRect(x,y+4,dw-4,dh-8);ctx.fillRect(x+dw-10,y,12,12);ctx.fillStyle="#fff";ctx.fillRect(x+dw-3,y+3,2,2);ctx.fillStyle="#535353";const leg=Math.floor(frame/6)%2;if(dino.y===0&&!over){ctx.fillRect(x+4,y+dh-4,4,4);ctx.fillRect(x+12,y+dh-4,4,4);if(leg)ctx.clearRect(x+4,y+dh-2,4,2);else ctx.clearRect(x+12,y+dh-2,4,2)}else{ctx.fillRect(x+4,y+dh-4,4,4);ctx.fillRect(x+12,y+dh-4,4,4)}ctx.fillRect(x+dw-4,y+10,3,3)}
  step();
}

/* ============ Boot ============ */
applySettings();renderIcons();renderDock();applyI18n();
document.getElementById("enter").onclick=()=>{document.getElementById("welcome").style.display="none"};
</script>
